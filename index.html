<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limão 2026 - Vibe 2010</title>
    <style>
        /* --- ESTILO WEB 2.0 / VIBE 2010 TOTALMENTE AMARELO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Arial Black", Gadget, sans-serif;
        }

        body {
            background-color: #ffeb3b; /* Amarelo idêntico ao da imagem */
            background-image: radial-gradient(#fff176 20%, transparent 20%),
                              radial-gradient(#fff176 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #000000;
            padding: 20px;
        }

        /* Container Principal estilo Comunidade do Orkut / Site de Flash de 2010 */
        .container {
            max-width: 800px;
            margin: 30px auto;
            background: #fffde7;
            border: 4px solid #000000;
            box-shadow: 10px 10px 0px #000000;
            padding: 25px;
            text-align: center;
        }

        /* Header com o Logo inclinado e rústico */
        header {
            background: #ffeb3b;
            border: 4px solid #000000;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 5px 5px 0px #000000;
            transform: rotate(-1deg);
        }

        .logo-title {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
            color: #000000;
        }

        .logo-year {
            font-size: 3rem;
            display: block;
            margin-top: 5px;
            letter-spacing: 4px;
        }

        /* Estilo das Seções com Barras de Título Web 2.0 Clássicas */
        .section-box {
            border: 3px solid #000000;
            background: #ffffff;
            margin-bottom: 30px;
            box-shadow: 6px 6px 0px #000000;
            text-align: left;
        }

        .section-header {
            background: #000000;
            color: #ffeb3b;
            padding: 10px 15px;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-body {
            padding: 20px;
        }

        .about-text {
            font-size: 1.4rem;
            line-height: 1.5;
            font-weight: bold;
            color: #000;
        }

        /* Destaque para a Data (Estilo Botão de Gel/Plástico de 2010) */
        .date-container {
            margin-top: 20px;
            text-align: center;
        }

        .date-badge {
            display: inline-block;
            background: linear-gradient(to bottom, #fff59d 0%, #ffeb3b 50%, #fdd835 51%, #fbc02d 100%);
            border: 3px solid #000000;
            color: #000000;
            padding: 15px 40px;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px #000000;
            border-radius: 10px;
        }

        /* Grid de Integrantes / Equipes */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        /* Card de Integrante estilo Perfil de Fórum antigo */
        .member-card {
            background: #fffde7;
            border: 3px solid #000000;
            padding: 15px;
            text-align: center;
            box-shadow: 4px 4px 0px #000000;
            transition: background 0.1s;
        }

        .member-card:hover {
            background: #ffeb3b;
            cursor: pointer;
        }

        .member-pic {
            width: 100%;
            height: 120px;
            background: #000000;
            color: #ffeb3b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 12px;
            border: 2px solid #000000;
        }

        .member-name {
            font-size: 1.5rem;
            text-transform: uppercase;
            color: #000000;
        }

        footer {
            margin-top: 30px;
            font-size: 1rem;
            text-transform: uppercase;
            color: #000000;
            border-top: 2px dashed #000000;
            padding-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">

        <header>
            <div class="logo-title">LIMÃO</div>
            <div class="logo-year">2026</div>
        </header>

        <div class="section-box">
            <div class="section-header">SOBRE LIMÃO 2026</div>
            <div class="section-body">
                <p class="about-text">
                    Um evento que vai juntar esportes e brincadeiras, quem fazer um ponto maior ganha!
                </p>
                
                <div class="date-container">
                    <div class="date-badge">EM 21 DE OUTUBRO</div>
                </div>
            </div>
        </div>

        <div class="section-box">
            <div class="section-header">Equipes</div>
            <div class="section-body">
                <div class="teams-grid">
                    
                    <div class="member-card">
                        <div class="member-pic">L</div>
                        <div class="member-name">Lucas</div>
                    </div>

                    <div class="member-card">
                        <div class="member-pic">I</div>
                        <div class="member-name">Iran</div>
                    </div>

                    <div class="member-card">
                        <div class="member-pic">M</div>
                        <div class="member-name">Matheus</div>
                    </div>

                </div>
            </div>
        </div>

        <footer>
            <p>© Limão 2026</p>
            <p>®3 Amigos Copyright</p>
        </footer>

    </div>

</body>
</html>
