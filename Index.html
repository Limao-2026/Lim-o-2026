<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limão 2026 - O Evento Mais Esperado!</title>
    <style>
        /* --- ESTILO WEB 2.0 / VIBE 2010 TOTALMENTE AMARELO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Arial Black", Gadget, sans-serif;
        }

        body {
            background-color: #ffeb3b; /* Amarelo idêntico ao da imagem */
            background-image: radial-gradient(#fff176 20%, transparent 20%),
                              radial-gradient(#fff176 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #000000;
            padding: 20px;
        }

        /* Container Principal estilo Comunidade do Orkut / Site de Flash de 2010 */
        .container {
            max-width: 800px;
            margin: 30px auto;
            background: #fffde7;
            border: 4px solid #000000;
            box-shadow: 10px 10px 0px #000000;
            padding: 25px;
            text-align: center;
        }

        /* Header com o Logo inclinado e rústico */
        header {
            background: #ffeb3b;
            border: 4px solid #000000;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 5px 5px 0px #000000;
            transform: rotate(-1deg);
        }

        .logo-title {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.9;
            color: #000000;
        }

        .logo-year {
            font-size: 3rem;
            display: block;
            margin-top: 5px;
            letter-spacing: 4px;
        }

        /* Estilo das Seções com Barras de Título Web 2.0 Clássicas */
        .section-box {
            border: 3px solid #000000;
            background: #ffffff;
            margin-bottom: 30px;
            box-shadow: 6px 6px 0px #000000;
            text-align: left;
        }

        .section-header {
            background: #000000;
            color: #ffeb3b;
            padding: 10px 15px;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-body {
            padding: 20px;
        }

        .about-text {
            font-size: 1.4rem;
            line-height: 1.5;
            font-weight: bold;
            color: #000;
        }

        /* Destaque para a Data (Estilo Botão de Gel/Plástico de 2010) */
        .date-container {
            margin-top: 20px;
            text-align: center;
        }

        .date-badge {
            display: inline-block;
            background: linear-gradient(to bottom, #fff59d 0%, #ffeb3b 50%, #fdd835 51%, #fbc02d 100%);
            border: 3px solid #000000;
            color: #000000;
            padding: 15px 40px;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px #000000;
            border-radius: 10px;
        }

        /* --- ESTILO DA CONTAGEM REGRESSIVA --- */
        .countdown-title {
            font-size: 1.3rem;
            text-align: center;
            margin-top: 25px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .countdown-display {
            font-size: 2.2rem;
            background: #000000;
            color: #ffeb3b;
            padding: 15px;
            border: 3px solid #000000;
            box-shadow: 4px 4px 0px #ffeb3b, inset 0px 0px 10px rgba(255,235,59,0.5);
            font-family: monospace, sans-serif; /* Fonte mono para os números não dançarem */
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 5px;
            text-align: center;
            max-width: 450px;
            margin: 0 auto;
        }

        .countdown-labels {
            font-size: 0.7rem;
            color: #a69b1e;
            display: block;
            margin-top: 5px;
            word-spacing: 25px;
            text-indent: 15px;
        }

        /* Grid de Integrantes / Equipes */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        /* Card de Integrante estilo Perfil de Fórum antigo */
        .member-card {
            background: #fffde7;
            border: 3px solid #000000;
            padding: 15px;
            text-align: center;
            box-shadow: 4px 4px 0px #000000;
            transition: background 0.1s;
        }

        .member-card:hover {
            background: #ffeb3b;
            cursor: pointer;
        }

        .member-pic {
            width: 100%;
            height: 120px;
            background: #000000;
            color: #ffeb3b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 12px;
            border: 2px solid #000000;
        }

        .member-name {
            font-size: 1.5rem;
            text-transform: uppercase;
            color: #000000;
        }

        footer {
            margin-top: 30px;
            font-size: 1rem;
            text-transform: uppercase;
            color: #000000;
            border-top: 2px dashed #000000;
            padding-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">

        <header>
            <div class="logo-title">LIMÃO</div>
            <div class="logo-year">2026</div>
        </header>

        <div class="section-box">
            <div class="section-header">SOBRE LIMÃO 2026</div>
            <div class="section-body">
                <p class="about-text">
                    Um evento que vai juntar esportes e brincadeiras, quem fazer um ponto maior ganha!
                </p>
                
                <div class="date-container">
                    <div class="date-badge">EM 21 DE OUTUBRO</div>
                </div>

                <div class="countdown-title">CONTAGEM REGRESSIVA LIMÃO 2026</div>
                <div class="countdown-display" id="contador">00:00:00:00</div>
                <div class="countdown-labels">DIAS HORAS MIN SEGUNDOS</div>
            </div>
        </div>

        <div class="section-box">
            <div class="section-header">Equipes</div>
            <div class="section-body">
                <div class="teams-grid">
                    
                    <div class="member-card">
                        <div class="member-pic">L</div>
                        <div class="member-name">Lucas</div>
                    </div>

                    <div class="member-card">
                        <div class="member-pic">I</div>
                        <div class="member-name">Iran</div>
                    </div>

                    <div class="member-card">
                        <div class="member-pic">M</div>
                        <div class="member-name">Matheus</div>
                    </div>

                </div>
            </div>
        </div>

        <footer>
            <p>© Limão 2026</p>
            <p>®3 Amigos Copyright</p>
        </footer>

    </div>

    <script>
        // Define a data alvo: 21 de Outubro de 2026 às 00:00:00
        const dataAlvo = new Date("Oct 21, 2026 00:00:00").getTime();

        // Atualiza o cronômetro a cada 1 segundo
        const intervalo = setInterval(function() {
            const agora = new Date().getTime();
            const diferenca = dataAlvo - agora;

            // Cálculos de tempo para dias, horas, minutos e segundos
            const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferenca % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferenca % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferenca % (1000 * 60)) / 1000);

            // Formatação para garantir que sempre tenham 2 dígitos (ex: 05 em vez de 5)
            const stringDias = String(dias).padStart(2, '0');
            const stringHoras = String(horas).padStart(2, '0');
            const stringMinutos = String(minutos).padStart(2, '0');
            const stringSegundos = String(segundos).padStart(2, '0');

            // Exibe o resultado no elemento com id="contador"
            document.getElementById("contador").innerHTML = `${stringDias}:${stringHoras}:${stringMinutos}:${stringSegundos}`;

            // Se a contagem terminar, exibe uma mensagem
            if (diferenca < 0) {
                clearInterval(intervalo);
                document.getElementById("contador").innerHTML = "00:00:00:00";
                document.querySelector(".countdown-title").innerHTML = "O LIMÃO 2026 JÁ COMEÇOU! 🍋";
            }
        }, 1000);
    </script>

</body>
</html>
